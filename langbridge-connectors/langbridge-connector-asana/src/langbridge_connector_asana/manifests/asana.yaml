schema_version: "0.1.0"
kind: declarative_http_connector
id: asana
display_name: Asana
connector_type: ASANA
connector_family: API
description: Declarative Asana workspace connector for sync-oriented dataset materialization.
base_url: https://app.asana.com/api/1.0/workspaces/example
test_connection_path: /users

auth:
  strategy: bearer_token
  token_field: access_token
  token_label: Access Token
  header_name: Authorization
  header_template: "Bearer {access_token}"

pagination:
  strategy: cursor
  response_items_field: data
  limit_param: limit
  cursor_param: offset
  next_cursor_source: response
  next_cursor_field: next_page.offset
  default_page_size: 100
  max_page_size: 100

incremental:
  strategy: request_param
  request_param: modified_since
  cursor_field: modified_at
  cursor_type: iso_datetime

resources:
  - key: teams
    label: Teams
    path: /teams
    primary_key: gid
    supports_incremental: false
    default_sync_mode: FULL_REFRESH
    description: Asana teams visible in the selected workspace.

  - key: projects
    label: Projects
    path: /projects
    primary_key: gid
    supports_incremental: false
    default_sync_mode: FULL_REFRESH
    description: Asana projects in the selected workspace.

  - key: users
    label: Users
    path: /users
    primary_key: gid
    supports_incremental: false
    default_sync_mode: FULL_REFRESH
    description: Asana users visible in the selected workspace.
