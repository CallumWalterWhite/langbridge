connector:
  name: shopify
  type: SHOPIFY
  package: langbridge-connector-shopify
  note: Package-owned Shopify connector preserves runtime sync behavior while loading through the plugin registry.

examples:
  - name: shopify_customers
    description: Materialize Shopify customers from a shop-specific Admin API base URL.
    connector: shopify
    sync:
      resource_key: customers
      sync_mode: INCREMENTAL
      params:
        limit: 100

  - name: shopify_orders
    description: Materialize Shopify orders with the same package-owned auth and pagination runtime.
    connector: shopify
    sync:
      resource_key: orders
      sync_mode: INCREMENTAL
      params:
        limit: 100
